scenario: receipt
description: "シナリオ44: 一般経費領収書・請求書"

fields:
  - name: vendor_name
    type: company
    required: true
  - name: issue_date
    type: date
    required: true
  - name: total_amount
    type: amount
    required: true
    critical: true
  - name: invoice_number
    type: id
    required: false

validations:
  - rule: "issue_date <= today"
    severity: WARN
