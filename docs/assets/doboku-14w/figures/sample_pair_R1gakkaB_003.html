<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <title>R1gakkaB-003 4図表</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    .panel { border: 1px solid #ddd; padding: 8px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .item { border: 1px solid #bbb; padding: 8px; }
    img { max-width: 100%; height: auto; display: block; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>R1gakkaB-003: 設問全体と図表（4件）</h2>

  <div class="panel">
    <div>設問全体</div>
    <img src="sample_full_R1gakkaB_003.png" alt="question full"/>
  </div>

  <div class="panel">
    <div>図表（4件）</div>
    <div class="grid">
      <div class="item">
        <div>図表1</div>
        <img src="sample_fig_R1gakkaB_003_1.png" alt="figure 1"/>
      </div>
      <div class="item">
        <div>図表2</div>
        <img src="sample_fig_R1gakkaB_003_2.png" alt="figure 2"/>
      </div>
      <div class="item">
        <div>図表3</div>
        <img src="sample_fig_R1gakkaB_003_3.png" alt="figure 3"/>
      </div>
      <div class="item">
        <div>図表4</div>
        <img src="sample_fig_R1gakkaB_003_4.png" alt="figure 4"/>
      </div>
    </div>
  </div>
</body>
</html>
